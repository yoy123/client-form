  <script>
function formatDobForForum(dobValue) {
  if (!dobValue) {
    return dobValue;
  }

  const isoMatch = dobValue.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!isoMatch) {
    return dobValue;
  }

  const [, year, month, day] = isoMatch;
  return `${month}${day}${year}`;
}

const phoneInput = document.querySelector('input[name="phone"]');
const barcodeInput = document.getElementById('barCode');

function syncBarcodeWithPhone() {
  if (!barcodeInput || !phoneInput) {
    return;
  }

  barcodeInput.value = phoneInput.value;
}

if (phoneInput) {
  phoneInput.addEventListener('input', syncBarcodeWithPhone);
  syncBarcodeWithPhone();
}

document.getElementById('clientForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  
  const messageDiv = document.getElementById('message');
  messageDiv.textContent = 'Submitting...';
  messageDiv.className = '';

  try {
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.birthDate = formatDobForForum(data.dob);
    delete data.dob;

    const response = await fetch('https://98b8-151-243-141-17.ngrok-free.app/submit', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (response.ok) {
      messageDiv.textContent = "Form submitted successfully! Page will reload...";
      messageDiv.className = 'success';
      this.reset();
      syncBarcodeWithPhone();
      setTimeout(() => location.reload(), 2000);
    } else {
      messageDiv.textContent = `Error: ${result.error || 'Failed to submit form'}`;
      messageDiv.className = 'error';
    }
  } catch (err) {
    console.error("Submission error:", err);
    messageDiv.textContent = `Connection error: ${err.message}. Check if Flask service is running.`;
    messageDiv.className = 'error';
  }
});
</script>
